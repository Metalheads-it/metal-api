name: Pull Request Check

on:
    pull_request:
        branches: ['main']

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x]

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run build --if-present
            - run: npm test

    docker-build:
        runs-on: ubuntu-latest

        # Ensures the docker-build job runs after the build job
        needs: build

        steps:
            - uses: actions/checkout@v4
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker-container

            - name: Build Docker image for validation
              uses: docker/build-push-action@v5
              with:
                  context: .
                  tags: metalheads/metal-api:pr-${{ github.event.pull_request.number }}
                  push: false # Disable pushing to Docker registry
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: metalheads/metal-api:pr-${{ github.event.pull_request.number }}
                  format: 'table'
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'
